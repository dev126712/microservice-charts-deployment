apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-nginx-config
  namespace: frontend-ns
data:
  default.conf: |
    server {
        listen 80;
        location / {
            root /usr/share/nginx/html;
            index index.html;
        }
        location /api/orders {
            # Use the FQDN so Nginx can find the service in another namespace
            proxy_pass http://order-service.order-ns.svc.cluster.local:5000;
        }
        location /api/products/ {
            proxy_pass http://product-service:3000/;
        }
    }
