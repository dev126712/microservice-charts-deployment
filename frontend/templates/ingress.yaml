{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "frontend.fullname" . }}
  labels:
    {{- include "frontend.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          - path: /              # All UI traffic
            pathType: Prefix
            backend:
              service:
                name: frontend-micro
                port: { number: 80 }
          - path: /api/orders    # Route directly to Order Namespace
            pathType: Prefix
            backend:
              service:
                name: order-service-shim #order-service.order-ns.svc.cluster.local
                port: { number: 5000 }
          - path: /api/products  # Route directly to Product Namespace
            pathType: Prefix
            backend:
            service:
              name: product-service.product-ns.svc.cluster.local
              port: { number: 3000 }
          {{- end }}
    {{- end }}
{{- end }}
