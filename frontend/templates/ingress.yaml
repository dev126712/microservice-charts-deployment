apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "frontend.fullname" . }}
spec:
  ingressClassName: nginx
  rules:
  - host: ""
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ include "frontend.fullname" . }}
            port: 8080
      - path: /api/orders
        pathType: Prefix
        backend:
          service:
            name: order-service-shim
            port: { number: 5000 }
      - path: /api/products
        pathType: Prefix
        backend:
          service:
            name: product-service-shim
            port: { number: 3000 }
