kind: Gateway
apiVersion: gateway.networking.k8s.io/v1
metadata:
  name: external-gateway-http
  namespace: default
  annotations:
    networking.gke.io/static-ip: lb-static-ip
spec:
  # This GatewayClass uses a global external Application Load Balancer.
  gatewayClassName: gke-l7-global-external-managed
  listeners:
  - name: http
    protocol: HTTP
    port: 80
    allowedRoutes:
      namespaces:
        from: All 
