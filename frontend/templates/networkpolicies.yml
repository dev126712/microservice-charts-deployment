apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-default-deny
  namespace: frontend-ns
spec:
  podSelector: {} # Selects all pods in the namespace
  policyTypes:
  - Ingress
  - Egress
  ---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-frontend
  namespace: frontend-ns
spec:
  podSelector:
    matchLabels:
      app: microservice
      tier: frontend
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          # Adjust this label to match your Ingress Controller's namespace
          kubernetes.io/metadata.name: ingress-nginx 
    ports:
    - protocol: TCP
      port: 80
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-egress-to-backends
  namespace: frontend-ns
spec:
  podSelector:
    matchLabels:
      app: microservice
      tier: frontend
  policyTypes:
  - Egress
  egress:
  # Traffic to Order Service
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: order-ns
    ports:
    - protocol: TCP
      port: 5000
  # Traffic to Product Service
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: product-ns
    ports:
    - protocol: TCP
      port: 3000
  # Traffic to DNS (Required for FQDN resolution)
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
