replicaCount: 1

image:
  repository: dev126712/micro-frontend
  pullPolicy: IfNotPresent
  tag: "274ca6715c3d6e08fc750099f8f3031beb2c638b"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""


serviceAccount:
  create: false
  automount: true
  annotations: {}
  name: ""


podAnnotations: {}
podLabels:
  app: microservice
  tier: frontend

# podSecurityContext: {}
#    # fsGroup: 2000

securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1000


service:
  type: NodePort
  port: 8080
  targetPort: 8080

# ingress:
#   enabled: true
