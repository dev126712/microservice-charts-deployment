replicaCount: 1
image:
  repository: dev126712/micro-frontend
  pullPolicy: IfNotPresent
  tag: "508c864b4fbb247d25c3f296a947a20909d6f049"
imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""
serviceAccount:
  create: false
  automount: true
  annotations: {}
  name: ""
podAnnotations: {}
podLabels:
  app: microservice
  tier: frontend
# podSecurityContext: {}
#    # fsGroup: 2000
securityContext:
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1000
service:
  type: NodePort
  port: 8080
  targetPort: 8080


# Requires Gateway API resources and suitable controller installed within the cluster
# (see: https://gateway-api.sigs.k8s.io/guides/)
httpRoute:
  enabled: true
  annotations: {}
  # Which Gateways this Route is attached to.
  parentRefs:
    - name: external-gateway-http
      sectionName: http
      namespace: default
  # Hostnames matching HTTP header.
  hostnames: []
  # List of rules and filters applied.
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend-service
          namespace: frontend-ns
          port: 8080

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 128Mi
# livenessProbe:
#   httpGet:
#     path: /
#     port: 8080
# readinessProbe:
#   httpGet:
#     path: /
#     port: 8080
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80
volumes:
  - name: nginx-config
    configMap:
      name: frontend-nginx-config
  - name: cache-volume
    emptyDir: {}
  - name: run-volume
    emptyDir: {}
volumeMounts:
  - name: nginx-config
    mountPath: /etc/nginx/conf.d/default.conf
    subPath: default.conf
  - name: cache-volume
    mountPath: /var/cache/nginx
  - name: run-volume
    mountPath: /var/run
nodeSelector: {}
tolerations: []
affinity: {}
