replicaCount: 1

image:
  repository: dev126712/micro-frontend
  pullPolicy: IfNotPresent
  tag: "a15236a9badf1a992f7f669b56cc2281f8ac6872"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""


serviceAccount:
  create: false
  automount: true
  annotations: {}
  name: ""


podAnnotations: {}
podLabels:
  app: microservice
  tier: frontend

podSecurityContext:
   fsGroup: 2000

securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000


service:
  type: ClusterIP
  port: 80
  targetPort: 8080

