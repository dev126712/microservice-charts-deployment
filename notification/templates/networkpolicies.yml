apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: notification-ns
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-order-to-notification
  namespace: notification-ns 
spec:
  podSelector:
    matchLabels:
      app: microservice
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: order-ns 
      ports:
        - protocol: TCP
          port: 5001
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: aiops
      ports:
        - protocol: TCP
          port: 8000
  egress: {}
