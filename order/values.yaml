replicaCount: 1

image:
  repository: dev126712/micro-order-service
  pullPolicy: IfNotPresent
  tag: "72613b4c3a9c3a3314e8aa206f1856a26ddfdccf"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels:
  app: microservice
  tier: order

podSecurityContext:
  fsGroup: 2000

securityContext:
  capabilities:
   drop:
   - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

service:
  type: ClusterIP
  port: 5000
  targetPort: 5000

resources:
   limits:
     cpu: 100m
     memory: 128Mi
   requests:
     cpu: 100m
     memory: 128Mi

livenessProbe:
  httpGet:
    path: /health
    port: 5000
# readinessProbe:
#   httpGet:
#     path: /health
#     port: http

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

volumes: []
  # - name: foo
  #   secret:
  #     secretName: mysecret
  #     optional: false

volumeMounts: {}
  # - name: foo
  #   mountPath: /etc/foo
  #   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}
