apiVersion: v1
kind: Service
metadata:
  name: redis-headless # Change this
  namespace: redis-ns
spec:
  clusterIP: None      # Headless service
  selector:
    app: redis         # Ensure this matches your Redis pod labels
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
spec:
  serviceName: "redis"
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        command: ["redis-server", "--appendonly", "yes"] # Persistence enabled
        ports:
          - containerPort: 6379
        resources:
          limits:
            memory: "256Mi"
          requests:
            memory: "128Mi"
        volumeMounts:
        - name: redis-data
          mountPath: /data
  volumeClaimTemplates:
  - metadata:
      name: redis-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 1Gi
