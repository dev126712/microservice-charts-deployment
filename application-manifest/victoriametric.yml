apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: victoria-metrics-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://victoriametrics.github.io/helm-charts/
    targetRevision: 0.22.1 # Always pin your version
    chart: victoria-metrics-k8s-stack
    helm:
      values: |
        # This part installs Grafana and sets up the dashboards automatically
        grafana:
          enabled: true
        # Node exporter runs on every node to get CPU/RAM stats
        prometheus-node-exporter:
          enabled: true
        # VictoriaMetrics handles the storage (faster/lighter than Prometheus)
        vmsingle:
          enabled: true
          retentionPeriod: 14d
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    createNamespace: true
